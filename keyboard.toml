# Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "C3 Super Mini Macropad"
product_id = 0x1001
vendor_id = 0x303a
chip = "esp32c3"

[matrix]
# Uses a single-layer matrix array map for standard individual button lines
matrix_type = "direct_pin"
direct_pins = [
    ["GPIO20", "GPIO9", "GPIO2", "GPIO1", "GPIO21", "GPIO10", "GPIO3", "GPIO0"]
]
# Pins pull down to ground on press (Change to false if using pull-up logic)
low_active = true

[storage]
# Required for Vial to dynamically remember changes without flashing
enabled = true

[vial]
enabled = true

[layout]
# Sets up a basic 4-layer capacity to swap shortcuts dynamically via Vial
rows = 1
cols = 8
layers = 4
keymap = [
    # Layer 0
    [
        ["Macro1", "Macro2", "Macro0", "Escape", "Mute", "Play", "Next", "MO(1)"]
    ],
    # Layer 1 (standard blank transparent keys '__')
    [
        ["__", "__", "__", "__", "VolUp", "VolDown", "__", "__"]
    ],
    # Layer 2 
    [
        ["__", "__", "__", "__", "__", "__", "__", "__"]
    ],
    # Layer 3 
    [
        ["__", "__", "__", "__", "__", "__", "__", "__"]
    ]
]

[[behavior.macro.macros]]
operations = [
    { operation = "down", keycode = "LCtrl" },
    { operation = "tap", keycode = "X" },
    { operation = "up", keycode = "LCtrl" }
]

[[behavior.macro.macros]]
operations = [
    { operation = "down", keycode = "LCtrl" },
    { operation = "tap", keycode = "C" },
    { operation = "up", keycode = "LCtrl" }
]

[[behavior.macro.macros]]
operations = [
    { operation = "down", keycode = "LCtrl" },
    { operation = "tap", keycode = "V" },
    { operation = "up", keycode = "LCtrl" }
]
