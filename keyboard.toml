# Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "C3 Super Mini Macropad"
product_id = 0x1001
vendor_id = 0x303a
chip = "esp32c3"

[matrix]
# Uses a single-layer matrix array map for standard individual button lines
matrix_type = "direct_pin"
direct_pins = [
    ["PIN_20", "PIN_9", "PIN_2", "PIN_1", "PIN_21", "PIN_10", "PIN_3", "PIN_0"]
]
# Pins pull down to ground on press (Change to false if using pull-up logic)
direct_pin_low_active = true

[storage]
# Required for Vial to dynamically remember changes without flashing
enabled = true

[vial]
enabled = true

[layout]
# Sets up a basic 4-layer capacity to swap shortcuts dynamically via Vial
rows = 1
cols = 8
layers = 4
keymap = [
    # Layer 0 (Default media and function keys layout)
    [
        ["KC_F13", "KC_F14", "KC_F15", "KC_F16", "KC_MUTE", "KC_MPLY", "KC_MNXT", "MO(1)"]
    ],
    # Layer 1 (Activated when holding the last key)
    [
        ["KC_TRNS", "KC_TRNS", "KC_TRNS", "KC_TRNS", "KC_VOLU", "KC_VOLD", "KC_TRNS", "KC_TRNS"]
    ],
    # Layer 2 (Empty structural placeholders)
    [
        ["KC_TRNS", "KC_TRNS", "KC_TRNS", "KC_TRNS", "KC_TRNS", "KC_TRNS", "KC_TRNS", "KC_TRNS"]
    ],
    # Layer 3 (Empty structural placeholders)
    [
        ["KC_TRNS", "KC_TRNS", "KC_TRNS", "KC_TRNS", "KC_TRNS", "KC_TRNS", "KC_TRNS", "KC_TRNS"]
    ]
]
